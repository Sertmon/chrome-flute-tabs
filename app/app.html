<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Флейта — табы</title>
  <link rel="stylesheet" href="../sidepanel/sidepanel.css">
  <style>
    body { max-width: 520px; margin: 0 auto; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Флейта — табы</h1>
      <p class="subtitle">Сопрано в C · вкладка расширения (микрофон)</p>
    </header>

    <section class="live" aria-live="polite">
      <p class="live-caption">Текущая нота</p>
      <div class="live-note" id="liveNote">—</div>
      <div class="visual-stack">
        <div class="pitch-visual-wrap">
          <canvas id="pitchVisualCanvas" class="pitch-visual-canvas" aria-hidden="true"></canvas>
        </div>
        <div class="live-meta">
          <span id="liveFreq">— Hz</span>
          <span id="liveMelody" class="live-melody"></span>
        </div>
        <details id="notesPanel" class="sequence-panel" open>
          <summary>Записанные ноты</summary>
          <div class="sequence-body">
            <p id="emptyState" class="empty">Пока пусто.</p>
            <ol id="noteList" class="note-list" hidden></ol>
          </div>
        </details>
      </div>
      <div id="liveFingering" class="live-fingering"></div>
      <p id="liveHint" class="hint">Нажмите «Слушать» — Chrome спросит доступ к микрофону.</p>
    </section>

    <div id="micHelp" class="mic-help" hidden>
      <p class="mic-help-text"></p>
      <div class="mic-help-actions">
        <button id="openMicSettingsBtn" type="button" class="link-btn">Разрешения расширения</button>
      </div>
    </div>

    <details id="settingsPanel" class="settings-panel">
      <summary>Настройки</summary>
      <div id="settingsForm" class="settings-form"></div>
    </details>

    <div class="input-source-row">
      <label class="input-source-label" for="inputSourceSelect">Источник звука</label>
      <select id="inputSourceSelect" class="input-source-select">
        <option value="mic">Микрофон</option>
        <option value="tab">Звук вкладки (YouTube)</option>
      </select>
    </div>
    <p id="tabTargetHint" class="tab-target-hint" hidden></p>

    <div class="buttons">
      <button id="startBtn" type="button">Слушать</button>
      <button id="stopBtn" type="button" disabled>Стоп</button>
      <button id="clearBtn" type="button" disabled>Очистить</button>
      <button id="undoBtn" type="button" disabled>Убрать последнюю</button>
      <button id="saveNotesBtn" type="button" disabled>Сохранить</button>
    </div>

  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
